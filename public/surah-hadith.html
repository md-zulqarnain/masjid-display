<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Surah & Hadith Screen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <style>
        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header {
            text-align: center;
        }

        .kalima {
            font-size: 40px;
            margin: 10px 0;
            color: gold;
        }

        .time {
            font-size: 60px;
            font-weight: bold;
            color: gold;
        }

        .date {
            font-size: 18px;
            opacity: 0.8;
        }

        .separator {
            height: 1px;
            background: gold;
            margin: 20px 0;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .badge {
            border: 1px solid gold;
            padding: 5px 15px;
            margin-bottom: 20px;
            font-size: 14px;
            letter-spacing: 3px;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            /* important */
        }

        .arabic {
            width: 90%;
            height: 60%;
            /* limit height area */
            overflow: hidden;
            /* important */
            line-height: 1.8;
            direction: rtl;
            /* better for Arabic */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffffa6;
        }

        .reference {
            margin-top: 20px;
            font-size: 3.5vw;
            color: gold;
        }

        .referenceEn {
            font-size: 3vw;
            opacity: 0.7;
        }

        .fade {
            transition: opacity 0.6s ease;
        }

        .hidden {
            opacity: 0;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Top Arabic Header -->
        <!-- Top Arabic Header -->
        <div class="top-bar">
            <img src="images/roza.webp" class="corner-img">
            <div class="arabic-title">
                لا إِلَهَ إِلَّا اللَّهُ مُحَمَّدٌ رَّسُولُ اللهِ
            </div>

            <img src="images/kaaba.jpg" class="corner-img ">
        </div>

        <!-- Clock Section -->
        <div id="clock">
            <div class="clock-time">
                <span id="hours"></span>
                <span id="seconds"></span>
                <span id="ampm"></span>
            </div>
            <div class="date-row">
                <div id="date" class="date-left"></div>
            </div>
            <div class="nextPrayerAndHijri">
                <div id="nextPrayer" class="date-center card">
                    <div>
                        <div id="nextPrayerName"></div>
                        <h4 class="remainingTimeHeading">बाक़ी रह गया वक़्त</h4>
                        <div id="nextPrayerCountdown">
                            <span id="countHours" class="countdown">00</span> :
                            <span id="countMinutes" class="countdown">00</span> :
                            <span id="countSeconds" class="countdown">00</span>
                        </div>

                    </div>
                </div>
                <div class="nextPrayerAndHijriDate card">
                    <div>
                        <div id="hijri" class="date-right"></div>
                        <div id="ramadanTimes">
                            <span id="sahriTime"></span>
                            <span id="iftarTime"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-star">✦</div>
            <div class="divider-line"></div>
        </div>


        <div class="content fade" id="content">
            <div class="badge" id="type"></div>
            <!-- <div class="verse-section">
                <h2 id="verseReference"></h2>
                <p id="verseText"></p>
            </div> -->
            <div class="arabic" id="verseText"></div>
            <div class="divider divider-small">
                <div class="divider-line"></div>
                <div class="divider-star">❁</div>
                <div class="divider-line"></div>
            </div>
            <div class="reference" id="verseReference"></div>

            <div class="referenceEn" id="referenceEn"></div>
        </div>
        <footer class="footer">
            <p>जामा मस्जिद झिरन्या शेख</p>
            <div class="brand-log">
                <img src="images/logo.jpg" />
            </div>
        </footer>
    </div>
    <audio id="beepSound" preload="auto">
        <source src="audio/beep_long.wav" type="audio/wav" muted>
    </audio>
    <script src="app.js"></script>
    <script>

        let verses = [];
        let currentIndex = 0;
        let slideTimer = null;
        const content = document.getElementById("content");

        async function loadVersesFromServer() {
            try {
                const res = await fetch('/api/verses');
                verses = await res.json();

                if (!verses.length) {
                    document.getElementById("verseText").innerText = "No content available";
                    return;
                }

                updateVerse();
                // setInterval(updateVerse, 15000);

            } catch (err) {
                console.error("Error loading verses:", err);
            }
        }

        function fitText() {
            const el = document.getElementById('verseText');
            let fontSize = 60;
            el.style.fontSize = fontSize + "px";

            while (
                (el.scrollHeight > el.clientHeight ||
                    el.scrollWidth > el.clientWidth)
                && fontSize > 14
            ) {
                fontSize -= 1;
                el.style.fontSize = fontSize + "px";
            }
        }

        function updateVerse() {

            // ✅ Clear previous timer (IMPORTANT)
            if (slideTimer) {
                clearTimeout(slideTimer);
            }

            content.classList.add("hidden");

            setTimeout(() => {

                const current = verses[currentIndex];

                document.getElementById("type").innerText =
                    current.type.toUpperCase();

                document.getElementById("verseText").innerText =
                    current.text;

                document.getElementById("verseReference").innerText =
                    current.reference;

                document.getElementById("referenceEn").innerText = "";

                content.classList.remove("hidden");

                fitText();

                // 🔥 Better Word Count (removes extra spaces)
                const wordCount = current.text.trim().split(/\s+/).length;

                let displayTime = 4000 + (wordCount * 350);

                displayTime = Math.max(5000, displayTime);
                displayTime = Math.min(40000, displayTime);

                currentIndex = (currentIndex + 1) % verses.length;

                // ✅ Store timeout reference
                slideTimer = setTimeout(updateVerse, displayTime);

            }, 600);
        }

        window.addEventListener("load", loadVersesFromServer);
        window.addEventListener("resize", fitText);
    </script>

</body>

</html>
