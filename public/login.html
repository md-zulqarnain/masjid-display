<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login - Masjid Display</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0c1d15 0%, #1a3a2a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.1);
      padding: 50px;
      border-radius: 15px;
      border: 1px solid #333;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
    }

    .login-container h1 {
      text-align: center;
      color: #facc15;
      margin-bottom: 10px;
      font-size: 2em;
    }

    .login-container p {
      text-align: center;
      color: #bbb;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #facc15;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #444;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 1em;
      transition: all 0.3s;
    }

    input[type="password"]:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: #facc15;
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 10px rgba(250, 204, 21, 0.2);
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(22, 163, 74, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .message {
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
    }

    .message.error {
      background: rgba(220, 38, 38, 0.2);
      color: #fca5a5;
      border: 1px solid #dc2626;
    }

    .message.success {
      background: rgba(22, 163, 74, 0.2);
      color: #86efac;
      border: 1px solid #16a34a;
    }

    .message.show {
      display: block;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h1>🕌 Admin Login</h1>
    <p>Jama Masjid Jhirniya Shaikh</p>

    <div id="message" class="message"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required>
      </div>

      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required>
      </div>

      <button type="submit" id="submitBtn">Login</button>
    </form>
  </div>

  <script>
    // Check if already logged in
    if (localStorage.getItem('adminLogged')) {
      window.location.href = '/admin-panel.html';
    }

    async function handleLogin(event) {
      event.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      const messageEl = document.getElementById('message');

      // Simple validation - in production use proper authentication
      const validUsername = 'admin';
      const validPassword = 'admin123';

      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>Logging in...';

      // Simulate API call
      setTimeout(() => {
        if (username === validUsername && password === validPassword) {
          localStorage.setItem('adminLogged', 'true');
          messageEl.textContent = 'Login successful! Redirecting...';
          messageEl.className = 'message success show';
          setTimeout(() => {
            window.location.href = '/admin-panel.html';
          }, 1000);
        } else {
          messageEl.textContent = 'Invalid username or password';
          messageEl.className = 'message error show';
          btn.disabled = false;
          btn.textContent = 'Login';
        }
      }, 500);
    }
  </script>

</body>

</html>
