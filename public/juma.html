        .juma-wrapper {
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        .text-primary {
            color: #ffd700;
        }

        .animate-spin-slow {
            animation: spin 40s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Position rotating SVGs */
        .top-left {
            position: absolute;
            top: 10%;
            left: 0;
            width: 25%;
        }

        .top-right {
            position: absolute;
            top: 10%;
            right: 0;
            width: 25%;
        }

        .bottom-left {
            position: absolute;
            bottom: 10%;
            left: 0;
            width: 25%;
        }

        .bottom-right {
            position: absolute;
            bottom: 10%;
            right: 0;
            width: 25%;
        }

        /* Masjid bottom center */
        .masjid-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
        }

        .juma-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }

        .juma-header h1 {
            font-size: 3vw;
            margin: 0;
            text-align: center;
        }

        .juma-header h2 {
            font-size: 1.5vw;
            letter-spacing: 3px;
            margin-top: 10px;
            text-align: center;
        }

        .juma-time {
            font-size: 6vw;
            font-weight: bold;
            margin: 20px 0;
        }

        .juma-date {
            font-size: 1.5vw;
            margin-bottom: 30px;
        }

        .juma-boxes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            justify-content: space-around;
            gap: 5vw 2vw;
        }

        .juma-boxes .juma-box:last-child {
            grid-column: 1 / -1;
        }

        .juma-box {
            flex: 1;
            border: 0.3vw solid #ffffff1a;
            border-radius: 20px;
            padding: 70px 50px;
            backdrop-filter: blur(5px);
            text-align: center;
            background: transparent;
        }

        .juma-box h3 {
            font-size: 2vw;
            margin-bottom: 15px;
        }

        .juma-box h3 span {
            color: #ffffffc7;
            font-size: 5vw;
            font-weight: 600;
        }

        .juma-box p {
            font-size: 3vw;
            font-weight: bold;
        }



        @media (orientation: portrait) {
            .juma-boxes {
                flex-direction: column;
            }

            .juma-header h1 {
                font-size: 6vw;
            }

            .juma-header h2 {
                font-size: 5vw;
            }

            .juma-time {
                font-size: 12vw;
            }

            .juma-date {
                font-size: 3vw;
            }

            .juma-box h3 {
                font-size: 6vw;
                margin: 0;
            }

            .juma-box p {
                font-size: 8vw;
                margin: 0;
                color: #ffcc00;
            }

            .juma-box.active-row p {
                color: #ffffff;
            }

            .top-bar .corner-img {
                width: 21vw;
                height: revert-layer;
            }
        }
    </style>
