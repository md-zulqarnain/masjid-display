<!DOCTYPE html>

    <meta charset="utf-8">

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            /* background: linear-gradient(135deg, #052e1b, #0a3d2a); */
            background: #0c1d15;
            /* font-family: Arial, sans-serif; */
            overflow: hidden;
            color: #ffd700;
        }

        .juma-wrapper {
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        .text-primary {
            color: #ffd700;
        }

        .animate-spin-slow {
            animation: spin 40s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Position rotating SVGs */
        .top-left {
            position: absolute;
            top: 10%;
            left: 0;
            width: 25%;
        }

        .top-right {
            position: absolute;
            top: 10%;
            right: 0;
            width: 25%;
        }

        .bottom-left {
            position: absolute;
            bottom: 10%;
            left: 0;
            width: 25%;
        }

        .bottom-right {
            position: absolute;
            bottom: 10%;
            right: 0;
            width: 25%;
        }

        /* Masjid bottom center */
        .masjid-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
        }

        .juma-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }

        .juma-header h1 {
            font-size: 3vw;
            margin: 0;
            text-align: center;
        }

        .juma-header h2 {
            font-size: 1.5vw;
            letter-spacing: 3px;
            margin-top: 10px;
            text-align: center;
        }

        .juma-time {
            font-size: 6vw;
            font-weight: bold;
            margin: 20px 0;
        }

        .juma-date {
            font-size: 1.5vw;
            margin-bottom: 30px;
        }

        .juma-boxes {
            display: flex;
            justify-content: space-around;
            gap: 2vw;
        }

        .juma-box {
            flex: 1;
            border: 0.3vw solid #ffffff1a;
            border-radius: 20px;
            padding: 2.5vw;
            backdrop-filter: blur(5px);
            text-align: center;
        }

        .juma-box h3 {
            font-size: 2vw;
            margin-bottom: 15px;
        }

        .juma-box h3 span {
            color: #ffffffc7;
            font-size: 1vw;
            font-weight: 400;
            letter-spacing: 0.5vw;
        }

        .juma-box p {
            font-size: 3vw;
            font-weight: bold;
        }

        

        @media (orientation: portrait) {
            .juma-boxes {
                flex-direction: column;
            }

            .juma-header h1 {
                font-size: 6vw;
            }

            .juma-header h2 {
                font-size: 3vw;
            }

            .juma-time {
                font-size: 12vw;
            }

            .juma-date {
                font-size: 3vw;
            }

            .juma-box h3 {
                font-size: 4vw;
            }

            .juma-box p {
                font-size: 6vw;
            }
        }
    </style>

    <script>
        function updateJumaClock() {
            const now = new Date();

            document.getElementById("jumaClock").innerText =
                now.toLocaleTimeString("en-US", { hour: '2-digit', minute: '2-digit' });

            document.getElementById("jumaDate").innerText =
                now.toLocaleDateString("en-US", {
                    weekday: "long",
                    month: "long",
                    day: "numeric",
                    year: "numeric"
                });
        }

        setInterval(updateJumaClock, 1000);
        updateJumaClock();

        // Return to index after 3 hours
        setTimeout(() => {
            window.location.href = "index.html";
        }, 3 * 60 * 60 * 1000);

    </script>
