<!DOCTYPE html>
<html>

<head>
    <title>Admin Panel - Masjid Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c1d15 0%, #1a3a2a 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #facc15;
        }

        h1 {
            color: #facc15;
            font-size: 2.5em;
        }

        .logout-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #b91c1c;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab-btn {
            background: #1a3a2a;
            color: #facc15;
            border: 2px solid #333;
            padding: 12px 25px;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s;
            border-radius: 5px 5px 0 0;
            white-space: nowrap;
            flex: 0 0 auto;
        }

        .tab-btn:hover {
            background: #203c2f;
        }

        .tab-btn.active {
            background: #facc15;
            color: #0c1d15;
            border-color: #facc15;
        }

        .tab-content {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .tab-content.active {
            display: block;
        }

        .section {
            margin-bottom: 40px;
        }

        .section h2 {
            color: #facc15;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 2px solid #facc15;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #facc15;
            font-weight: bold;
        }

        select,
        input[type="text"],
        input[type="time"],
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1em;
        }

        select:focus,
        input:focus {
            outline: none;
            border-color: #facc15;
            background: rgba(255, 255, 255, 0.15);
        }

        .prayer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .prayer-card {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #444;
        }

        .prayer-card h3 {
            color: #facc15;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .time-input-group {
            margin-bottom: 15px;
        }

        .time-input-group label {
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #16a34a;
            color: white;
        }

        .btn-primary:hover {
            background: #15803d;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn-secondary:hover {
            background: #4b5563;
        }

        .video-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .video-card {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .video-card h3 {
            color: #facc15;
            word-break: break-all;
            font-size: 0.95em;
        }

        .video-card-actions {
            display: flex;
            gap: 10px;
        }

        .video-card-actions button {
            flex: 1;
            padding: 10px;
        }

        .upload-area {
            border: 2px dashed #facc15;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(250, 204, 21, 0.1);
        }

        .upload-area:hover {
            background: rgba(250, 204, 21, 0.2);
            border-color: #fcd34d;
        }

        .upload-area.dragover {
            background: rgba(250, 204, 21, 0.3);
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
        }

        .message.success {
            background: rgba(22, 163, 74, 0.2);
            color: #86efac;
            border: 1px solid #16a34a;
        }

        .message.error {
            background: rgba(220, 38, 38, 0.2);
            color: #fca5a5;
            border: 1px solid #dc2626;
        }

        .message.show {
            display: block;
        }

        .day-select {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .day-option {
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #444;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }

        .day-option:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .day-option.selected {
            background: #facc15;
            color: #0c1d15;
            border-color: #facc15;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(250, 204, 21, 0.3);
            border-top-color: #facc15;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive rules */
        @media (max-width: 900px) {
            .container {
                padding: 12px;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            h1 {
                font-size: 1.8em;
            }

            .tabs {
                gap: 8px;
            }

            .tab-btn {
                padding: 10px 16px;
                font-size: 1em;
            }

            .prayer-grid {
                grid-template-columns: 1fr;
            }

            .video-list {
                grid-template-columns: 1fr;
            }

            .upload-area {
                padding: 20px;
            }

            .video-card video {
                height: 180px;
            }
        }

        @media (max-width: 420px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 1.4em;
            }

            .tab-btn {
                flex: 1 1 100%;
                border-radius: 6px;
            }

            .prayer-card {
                padding: 14px;
            }

            .time-input-group input,
            select {
                font-size: 0.95em;
            }

            button {
                padding: 10px 12px;
                font-size: 0.95em;
            }

            .video-card h3 {
                font-size: 0.9em;
            }

            .upload-area {
                padding: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>🕌 Admin Panel</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('quick-times')">Quick Times</button>
            <button class="tab-btn" onclick="switchTab('videos')">Manage Videos</button>
        </div>

        <!-- Quick Times Tab -->
        <div id="quick-times" class="tab-content active">
            <div class="section">
                <h2>Quick Prayer Times</h2>
                <p style="color: #bbb; margin-bottom: 30px;">Set Azan and Jamah times for all prayers</p>

                <div class="prayer-grid" id="quickTimesContainer"></div>

                <div class="button-group" style="margin-top: 30px;">
                    <button class="btn-primary" onclick="saveQuickTimes()">
                        <span id="quickSaveBtn">Save Times</span>
                    </button>
                    <button class="btn-secondary" onclick="loadQuickTimes()">Reset</button>
                </div>

                <div id="quickMessage" class="message"></div>
            </div>
        </div>

        <!-- Videos Tab -->
        <div id="videos" class="tab-content">
            <div class="section">
                <h2>Video Management</h2>

                <div class="form-group">
                    <label>Upload New Video:</label>
                    <div class="upload-area" id="uploadArea" onclick="document.getElementById('videoInput').click()">
                        <p>Click to upload or drag and drop</p>
                        <p style="font-size: 0.9em; color: #bbb; margin-top: 10px;">MP4, WebM, OGG, MOV</p>
                        <input type="file" id="videoInput" accept="video/*" style="display:none;"
                            onchange="uploadVideo()">
                    </div>
                </div>

                <div id="uploadMessage" class="message"></div>

                <h3 style="color: #facc15; margin-top: 30px; margin-bottom: 20px;">Uploaded Videos</h3>
                <div id="videoList" class="video-list">
                    <p style="color: #bbb;">Loading videos...</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        const prayers = ['fajr', 'dhuhr', 'asr', 'maghrib', 'isha'];
        const prayerNames = {
            fajr: 'فجر - Fajr',
            dhuhr: 'ظهر - Dhuhr',
            asr: 'عصر - Asr',
            maghrib: 'مغرب - Maghrib',
            isha: 'عشاء - Isha'
        };

        let prayerData = {};
        let quickTimesData = {};

        // Tab Switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');

            if (tab === 'videos') {
                loadVideos();
            } else if (tab === 'quick-times') {
                loadQuickTimes();
            }
        }

        // Load quick times from timings.json
        async function loadQuickTimes() {
            try {
                const response = await fetch('/api/quick-times');
                quickTimesData = await response.json();
                console.log('Quick times loaded:', quickTimesData);
                renderQuickTimesForm();
            } catch (err) {
                console.error('Error loading quick times:', err);
                showMessage('quickMessage', 'Error loading times: ' + err.message, 'error');
            }
        }

        // Render quick times form
        function renderQuickTimesForm() {
            const container = document.getElementById('quickTimesContainer');
            container.innerHTML = '';

            prayers.forEach(prayer => {
                const times = quickTimesData[prayer] || { azan: '00:00', jamah: '00:00' };

                const card = document.createElement('div');
                card.className = 'prayer-card';

                let extraFields = '';

                // ===== FAJR EXTRA OPTIONS =====
                if (prayer === 'fajr') {
                    const enabled = times.specialEnabled || false;
                    const sahriMinutes = times.azanAfterSahri || 0;
                    const jamahAfterAzan = times.jamahAfterAzan || 0;

                    extraFields = `
        <div class="time-input-group">
          <label>
            <input type="checkbox" id="fajr-special-toggle" 
              ${enabled ? 'checked' : ''} 
              onchange="toggleFajrSpecial()">
            Enable Sahri Based Timing
          </label>
        </div>

        <div id="fajr-special-fields" style="display:${enabled ? 'block' : 'none'};">
          <div class="time-input-group">
            <label>Azan After Sahri (minutes):</label>
            <input type="number" min="0" id="fajr-azan-after-sahri" value="${sahriMinutes}">
          </div>
          <div class="time-input-group">
            <label>Jamah After Azan (minutes):</label>
            <input type="number" min="0" id="fajr-jamah-after-azan" value="${jamahAfterAzan}">
          </div>
        </div>
      `;
                }

                // ===== MAGHRIB EXTRA OPTION =====
                if (prayer === 'maghrib') {
                    const enabled = times.specialEnabled || false;
                    const jamahAfterAzan = times.jamahAfterAzan || 0;

                    extraFields = `
        <div class="time-input-group">
          <label>
            <input type="checkbox" id="maghrib-special-toggle" 
              ${enabled ? 'checked' : ''} 
              onchange="toggleMaghribSpecial()">
            Enable Jamah After Azan
          </label>
        </div>

        <div id="maghrib-special-fields" style="display:${enabled ? 'block' : 'none'};">
          <div class="time-input-group">
            <label>Jamah After Azan (minutes):</label>
            <input type="number" min="0" id="maghrib-jamah-after-azan" value="${jamahAfterAzan}">
          </div>
        </div>
      `;
                }

                card.innerHTML = `
      <h3>${prayerNames[prayer]}</h3>

      <div class="time-input-group">
        <label>Azan Time:</label>
        <input type="time" id="quick-${prayer}-azan" value="${convertTo24Hour(times.azan)}">
      </div>

      <div class="time-input-group">
        <label>Jamah Time:</label>
        <input type="time" id="quick-${prayer}-jamah" value="${convertTo24Hour(times.jamah)}">
      </div>

      ${extraFields}
    `;

                container.appendChild(card);
            });
        }
        // Convert 12-hour to 24-hour format
        function convertTo24Hour(time12) {
            if (!time12) return '00:00';

            // If already in 24-hour format, return as is
            if (time12.includes(':') && !time12.includes(' ')) {
                return time12;
            }

            const [time, modifier] = time12.split(' ');
            let [hours, minutes] = time.split(':');

            hours = parseInt(hours);
            if (modifier === 'PM' && hours !== 12) hours += 12;
            if (modifier === 'AM' && hours === 12) hours = 0;

            return String(hours).padStart(2, '0') + ':' + minutes;
        }

        // Convert 24-hour to 12-hour format
        function convertTo12Hour(time24) {
            let [hours, minutes] = time24.split(':');
            hours = parseInt(hours);
            const modifier = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            return String(hours).padStart(2, '0') + ':' + minutes + ' ' + modifier;
        }

        // Save quick times
        async function saveQuickTimes() {
            const btn = document.getElementById('quickSaveBtn');
            const originalText = btn.textContent;
            btn.innerHTML = '<span class="loading"></span>';
            btn.disabled = true;

            const updatedTimes = {};
            prayers.forEach(prayer => {
                const azanEl = document.getElementById(`quick-${prayer}-azan`);
                const jamahEl = document.getElementById(`quick-${prayer}-jamah`);

                updatedTimes[prayer] = {
                    azan: convertTo12Hour(azanEl.value),
                    jamah: convertTo12Hour(jamahEl.value)
                };

                // Special logic for Fajr
                if (prayer === 'fajr') {
                    const enabled = document.getElementById('fajr-special-toggle')?.checked || false;
                    updatedTimes[prayer].specialEnabled = enabled;

                    if (enabled) {
                        updatedTimes[prayer].azanAfterSahri =
                            parseInt(document.getElementById('fajr-azan-after-sahri').value) || 0;

                        updatedTimes[prayer].jamahAfterAzan =
                            parseInt(document.getElementById('fajr-jamah-after-azan').value) || 0;
                    }
                }

                // Special logic for Maghrib
                if (prayer === 'maghrib') {
                    const enabled = document.getElementById('maghrib-special-toggle')?.checked || false;
                    updatedTimes[prayer].specialEnabled = enabled;

                    if (enabled) {
                        updatedTimes[prayer].jamahAfterAzan =
                            parseInt(document.getElementById('maghrib-jamah-after-azan').value) || 0;
                    }
                }
            });

            try {
                const response = await fetch('/api/quick-times', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedTimes)
                });

                const result = await response.json();
                showMessage('quickMessage', result.message || 'Times saved successfully!', 'success');
                quickTimesData = updatedTimes;
            } catch (err) {
                showMessage('quickMessage', 'Error saving times: ' + err.message, 'error');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }



        // Video Management
        async function loadVideos() {
            try {
                const response = await fetch('/api/videos');
                const videos = await response.json();
                const container = document.getElementById('videoList');

                if (videos.length === 0) {
                    container.innerHTML = '<p style="color: #bbb; grid-column: 1/-1;">No videos uploaded yet</p>';
                    return;
                }

                container.innerHTML = '';
                videos.forEach(videoPath => {
                    const filename = videoPath.split('/').pop();
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
          <h3>${filename}</h3>
          <video width="100%" height="150" controls style="border-radius: 5px;">
            <source src="${videoPath}" type="video/mp4">
          </video>
          <div class="video-card-actions">
            <button class="btn-danger" onclick="deleteVideo('${filename}')">Delete</button>
          </div>
        `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error('Error loading videos:', err);
            }
        }

        // Upload video
        async function uploadVideo() {
            const fileInput = document.getElementById('videoInput');
            const file = fileInput.files[0];

            if (!file) return;

            const formData = new FormData();
            formData.append('video', file);

            const uploadArea = document.getElementById('uploadArea');
            uploadArea.innerHTML = '<div class="loading" style="margin: 20px auto;"></div>';

            try {
                const response = await fetch('/api/upload-video', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                if (response.ok) {
                    showMessage('uploadMessage', result.message || 'Video uploaded successfully!', 'success');
                    loadVideos();
                    fileInput.value = '';
                } else {
                    showMessage('uploadMessage', result.error || 'Upload failed', 'error');
                }
            } catch (err) {
                showMessage('uploadMessage', 'Error uploading video: ' + err.message, 'error');
            }

            uploadArea.innerHTML = '<p>Click to upload or drag and drop</p><p style="font-size: 0.9em; color: #bbb; margin-top: 10px;">MP4, WebM, OGG, MOV</p>';
        }

        // Delete video
        async function deleteVideo(filename) {
            if (!confirm('Are you sure you want to delete this video?')) return;

            try {
                const response = await fetch(`/api/video/${encodeURIComponent(filename)}`, {
                    method: 'DELETE'
                });

                const result = await response.json();
                if (response.ok) {
                    showMessage('uploadMessage', result.message || 'Video deleted successfully!', 'success');
                    loadVideos();
                } else {
                    showMessage('uploadMessage', result.error || 'Delete failed', 'error');
                }
            } catch (err) {
                showMessage('uploadMessage', 'Error deleting video: ' + err.message, 'error');
            }
        }

        // Drag and drop
        const uploadArea = document.getElementById('uploadArea');
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('video/')) {
                document.getElementById('videoInput').files = e.dataTransfer.files;
                uploadVideo();
            }
        });

        // Utility functions
        function showMessage(elementId, text, type) {
            const el = document.getElementById(elementId);
            el.textContent = text;
            el.className = 'message show ' + type;
            setTimeout(() => el.classList.remove('show'), 4000);
        }

        function logout() {
            sessionStorage.removeItem('adminLogged');
            window.location.href = '/login.html';
        }

        // Initialize
        if (!sessionStorage.getItem('adminLogged')) {
            window.location.href = '/login.html';
        }

        // Tab Switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');

            if (tab === 'videos') {
                loadVideos();
            }
        }

        loadQuickTimes();


        function toggleFajrSpecial() {
            const checked = document.getElementById('fajr-special-toggle').checked;
            document.getElementById('fajr-special-fields').style.display = checked ? 'block' : 'none';
        }

        function toggleMaghribSpecial() {
            const checked = document.getElementById('maghrib-special-toggle').checked;
            document.getElementById('maghrib-special-fields').style.display = checked ? 'block' : 'none';
        }
    </script>

</body>

</html>
