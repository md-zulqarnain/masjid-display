<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Masjid Display</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Top Arabic Header -->
  <div class="top-bar">
    <img src="https://png.pngtree.com/thumb_back/fh260/background/20250120/pngtree-a-view-of-kaba-mecca-image_16881215.jpg" class="corner-img left">
    <div class="arabic-title">
      لَا إِلٰهَ إِلَّا ٱللَّٰهُ مُحَمَّدٌ رَسُولُ ٱللَّٰهِ
    </div>
    <img src="https://thumbs.dreamstime.com/b/vector-draw-masjid-nabawi-madina-tun-nabi-grey-background-arabic-calligraphy-ya-rasool-allah-masjid-nabawi-madina-tun-160702294.jpg" class="corner-img right">
  </div>

  <!-- Clock Section -->
  <div id="clock">
    <div class="clock-time">
      <span id="hours"></span>
      <span id="seconds"></span>
      <span id="ampm"></span>
    </div>
    <div class="date-row">
      <div id="date" class="date-left"></div>
      <div id="nextPrayer" class="date-center">
        <div id="nextPrayerName"></div>
        <div id="nextPrayerCountdown"></div>
      </div>
      <div id="hijri" class="date-right"></div>
    </div>
  </div>

  <!-- Prayer Table -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Prayer</th>
          <th>الصلاة</th>
          <th>Start</th>
          <th>Azan</th>
          <th>Jamah</th>
          <th>End</th>
        </tr>
      </thead>
      <tbody id="prayerTable"></tbody>
    </table>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>Jama Masjid Jhirniya Shaikh</p>
  </footer>

</div>
<!-- Video Section -->
<video id="masjidVideo" muted style="display:none; position:fixed; width:100%; height:100%; top:0; left:0; object-fit:cover; z-index:9998;">
  <source src="" type="video/mp4">
</video>

<!-- Black Screen -->
<div id="blackScreen" style="display:none; position:fixed; width:100%; height:100%; top:0; left:0; background:black; z-index:9999;"></div>

<audio id="azanAudio" src="azan.mp3"></audio>

<script src="app.js"></script>
</body>
</html>
