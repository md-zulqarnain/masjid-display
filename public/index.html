<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Masjid Display</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- Top Arabic Header -->
    <div class="top-bar">
      <img src="images/roza.webp" class="corner-img">
      <div class="arabic-title">
        لَا إِلٰهَ إِلَّا ٱللَّٰهُ مُحَمَّدٌ رَسُولُ ٱللَّٰهِ
      </div>

      <img src="images/kaaba.jpg" class="corner-img ">
    </div>

    <!-- Clock Section -->
    <div id="clock">
      <div class="clock-time">
        <span id="hours"></span>
        <span id="seconds"></span>
        <span id="ampm"></span>
      </div>
      <div class="date-row">
        <div id="date" class="date-left"></div>
      </div>
      <div class="nextPrayerAndHijri">
        <div id="nextPrayer" class="date-center card">
          <div>
            <div id="nextPrayerName"></div>
            <h4 class="remainingTimeHeading">बाक़ी रह गया वक़्त</h4>
            <div id="nextPrayerCountdown">
              <span id="countHours" class="countdown">00</span> :
              <span id="countMinutes" class="countdown">00</span> :
              <span id="countSeconds" class="countdown">00</span>
            </div>

          </div>
        </div>
        <div class="nextPrayerAndHijriDate card">
          <div>
            <div id="hijri" class="date-right"></div>
            <div id="ramadanTimes">
              <span id="sahriTime"></span>
              <span id="iftarTime"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Prayer Table -->
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>नमाज़</th>
            <th>الصلاة</th>
            <th>वक़्त-ए-शुरू</th>
            <th>अज़ान</th>
            <th>जमाअत</th>
            <th>वक़्त-ए-ख़त्म</th>
          </tr>
        </thead>
        <tbody id="prayerTable"></tbody>
      </table>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>जामा मस्जिद झिरन्या शेख</p>
      <div class="brand-log">
        <img src="images/logo.jpg" />
      </div>
    </footer>

  </div>


  <!-- Black Screen -->
  <audio id="beepSound" src="audio/beep.mp3"></audio>

  <script src="app.js"></script>
</body>

</html>
